<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome back — Faithful Witness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #333858;
    --gold: #C49A3C;
    --gold-bg: #fdf8ee;
    --cream: #faf8f4;
    --text-primary: #1a1a2e;
    --text-secondary: #4a4a6a;
    --text-muted: #7a7a9a;
    --border: #e8e4f0;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--cream);
    color: var(--text-primary);
    margin: 0;
    padding: 0;
    min-height: 100vh;
    line-height: 1.6;
  }
  .top-accent { height: 4px; background: var(--gold); width: 100%; }
  nav {
    background: var(--navy);
    padding: 0 1.5rem;
    height: 64px;
    display: flex;
    align-items: center;
    color: #fff;
    font-family: 'Libre Baskerville', serif;
    font-size: 15px;
    font-weight: 600;
  }
  .wrap {
    max-width: 540px;
    margin: 0 auto;
    padding: 5rem 1.5rem 6rem;
    text-align: center;
  }
  .eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
  }
  h1 {
    font-family: 'Libre Baskerville', Georgia, serif;
    font-style: italic;
    font-size: 2rem;
    color: var(--navy);
    line-height: 1.25;
    margin: 0 0 1.5rem;
  }
  .lead {
    color: var(--text-secondary);
    font-size: 1rem;
    line-height: 1.8;
    margin: 0 auto 1.5rem;
    max-width: 460px;
  }
  .note {
    color: var(--text-muted);
    font-size: 0.9rem;
    line-height: 1.7;
    margin: 0 auto;
    max-width: 460px;
    font-style: italic;
  }
</style>
</head>
<body>
<div class="top-accent"></div>
<nav>Faithful Witness</nav>

<main class="wrap">
  <div class="eyebrow">Welcome back</div>
  <h1>Welcome back.</h1>
  <p class="lead">We have your reflection saved.</p>
  <p class="note">The full return experience is coming soon. We'll be in touch when you can pick up where you left off.</p>
</main>
</body>
</html>
